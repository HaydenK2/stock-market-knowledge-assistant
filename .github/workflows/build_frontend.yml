name: build webapp
on: [push]

jobs:
  deploy-web-app:
    runs-on: ubuntu-latest
    
    steps:
    - uses: Azure/static-web-apps-deploy@v1
      with:
        azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PURPLE_RIVER_0EABDA210 }}
        action: "upload"
        app_location: "./frontend"      # ✅ already correct
        output_location: "dist"         # ❌ was probably "build" — Vite uses "dist"
        api_location: ""                # your FastAPI location if applicable